    - >
      I'm a Ph.D. candidate in Robotics & Automation Engineering at Arizona
      State University, specializing in non-destructive testing in the ISNDE
      Lab. I borrow sensing strategies from nature — the aye-aye's tap, a
      lizard's climb, an octopus's grip — and turn them into robots that
      inspect structures without cutting them open.

