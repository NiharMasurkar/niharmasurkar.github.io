<section id="skills">
  <div class="wrap">
    <div class="sec-head">
      <span class="eyebrow">Toolbox</span>
      <h2>Skills &amp; instrumentation</h2>
    </div>
    <div class="skills">
      {% for set in site.data.skills %}
      <div class="skillset">
        <h4>{{ set.heading }}</h4>
        <div class="chips">
          {% for item in set.items %}<span class="chip">{{ item }}</span>{% endfor %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
