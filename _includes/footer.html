<footer id="contact">
  <div class="wrap">
    <span class="eyebrow" style="justify-content:center;display:flex">Get in touch</span>
    <h2 style="margin-top:16px">Let's talk robots that listen.</h2>
    <div class="links">
      <a class="btn solid" href="mailto:{{ site.email }}">{{ site.email }}</a>
      <a class="btn" href="{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn ↗</a>
      <a class="btn" href="{{ site.github }}" target="_blank" rel="noopener">GitHub ↗</a>
      <a class="btn" href="{{ site.scholar }}" target="_blank" rel="noopener">Scholar ↗</a>
      <a class="btn" href="{{ site.resume | relative_url }}" download>Résumé ↓</a>
    </div>
    <div class="colophon">Built with Jekyll · acoustic-signal theme · content in _data/*.yml</div>
  </div>
</footer>
